# Nixpacks build config for Coolify (and any other Nixpacks-based host).
#
# This builds the whole monorepo and runs the API server. See the "SPA",
# "Persistence", and "Required env vars" sections below for things you must
# also configure on the Coolify side — Nixpacks alone can't do those.
#
# ───────────────────────── Required env vars on Coolify ─────────────────────
#   BROWSER_MODE       "local" (default here) launches Chromium in-container;
#                      "browserless" connects to a remote CDP over wss and then
#                      requires the two BROWSERLESS_* vars below.
#   BROWSERLESS_URL    e.g. wss://browserless.your-host/  (NOT /chromium)
#                      — only needed when BROWSER_MODE=browserless
#   BROWSERLESS_TOKEN  the token your browserless instance was started with
#                      — only needed when BROWSER_MODE=browserless
#   PORT               (optional) defaults to 3001
#   WEB_ORIGIN         (optional) front-end origin for CORS; default
#                      http://localhost:5173 only matters if you separate the
#                      frontend
#   DATA_DIR           (optional) defaults to ./data; point at a mounted
#                      volume for persistence (see "Persistence" below)
#
# ───────────────────────── SPA (apps/web/dist) ──────────────────────────────
# `npm run build` produces apps/web/dist/. The Fastify server in this repo
# does NOT currently serve those files. Pick one:
#   1. Run a second Coolify service (Static type) pointed at apps/web/dist/
#      and reverse-proxy /api → this server. Simple if you already use Coolify
#      that way.
#   2. Add a small static-serving block to apps/server/src/index.ts —
#      @fastify/static is already in deps for exactly this. Then this single
#      container serves both API and SPA on PORT.
# Until one of those is in place, this container only exposes the API.
#
# ───────────────────────── Persistence (volumes) ────────────────────────────
# Two paths hold mutable state. Mount Coolify volumes on both, otherwise you
# lose everything on every redeploy.
#   /app/data                       → SQLite DB + screenshots + run logs
#   /root/.agent-browser            → daemon pid files + saved auth.json
#                                     state + auth vault (encrypted)
# The auth vault encryption key lives at /root/.agent-browser/.encryption-key
# — losing that means every saved auth profile becomes unreadable. Back it up.
#
# ───────────────────────── Native build toolchain ───────────────────────────
# better-sqlite3 and node-pty are compiled from source unless prebuilt
# binaries exist for the exact Node version. python3 + make + gcc cover both.
# agent-browser itself ships a prebuilt Linux binary inside its npm tarball.
#
# ───────────────────────── Browser (BROWSER_MODE=local) ─────────────────────
# With BROWSER_MODE=local the session daemon launches a real browser inside
# THIS container instead of connecting to browserless over wss. We provide it
# via Nix `chromium` (below) rather than `agent-browser install`, because a Nix
# package lands on PATH in the image — outside the /root/.agent-browser volume,
# which would otherwise shadow an installed copy at runtime. agent-browser
# auto-detects `chromium` on PATH; if it doesn't, set AGENT_BROWSER_EXECUTABLE_PATH
# to `which chromium`. fontconfig + a font package are needed or Chromium
# renders text as empty boxes in screenshots. The driver already passes
# --no-sandbox / --disable-dev-shm-usage, required for Chromium in a container.
# For BROWSER_MODE=browserless (remote wss) none of the chromium/font pkgs are
# used and can be dropped.
#
# ───────────────────────── Runtime: ffmpeg (video recording) ────────────────
# `ffmpeg` is a RUNTIME dependency, not a build tool. agent-browser's video
# recording (scenarios with "Record" enabled → record start/stop) pipes CDP
# screencast frames into a system `ffmpeg` spawned from PATH; without it the
# binary errors "ffmpeg not found / Install ffmpeg to enable recording" and the
# run logs a non-fatal warning (no .webm is produced). nixPkgs entries are on
# PATH at runtime too, so listing it below is all that's needed in the
# container. Locally, agent-browser inherits the server process's PATH and uses
# whatever `ffmpeg` is already installed.

providers = ["node"]

[variables]
# Pin Node 22 LTS. Matches the @types/node line in apps/server/package.json
# and is what tsx + better-sqlite3 ship prebuilt binaries for.
#
# NOTE: Node 24 is NOT available here — the Nixpacks version Coolify pins
# (image ubuntu-1745885067, nixpkgs ffeebf0...) predates Node 24's release, so
# its archive has no `nodejs_24` attribute. To move to 24, first bump the
# Nixpacks version in Coolify to a mid-2025-or-later release, then change this
# value and the nodejs_24 entry in [phases.setup] together.
NIXPACKS_NODE_VERSION = "22"
# Production env. Skips dev-only behavior in Fastify and Vite.
NODE_ENV = "production"
# Launch a real browser inside this container (Nix `chromium` above) rather
# than connecting to browserless over wss. Override to "browserless" in Coolify
# if you switch back to a remote CDP. See the "Browser" note above.
BROWSER_MODE = "local"
# Point agent-browser at the Nix chromium explicitly. Without this it falls back
# to the FHS-linked Chrome it downloads under ~/.agent-browser, which dies in
# this slim container ("libglib-2.0.so.0: cannot open shared object file").
# /root/.nix-profile/bin/chromium is the stable per-build symlink to the Nix
# package pinned in nixPkgs above (root is $HOME in this container).
AGENT_BROWSER_EXECUTABLE_PATH = "/root/.nix-profile/bin/chromium"

[phases.setup]
# Toolchain for native modules + ffmpeg for agent-browser video recording.
# nixPkgs are installed before any npm work and stay on PATH at runtime.
#
# `nodejs_22` here is what actually puts node + npm on PATH (it resolves
# against Nixpacks' pinned nixpkgs, which HAS nodejs_22 but NOT nodejs_24).
# Keep this version in sync with NIXPACKS_NODE_VERSION above.
nixPkgs = [
  "nodejs_22",
  "python3",
  "gnumake",
  "gcc",
  "pkg-config",
  "ffmpeg",
  # Local browser for BROWSER_MODE=local (see "Browser" note above).
  "chromium",
  "fontconfig",
  "dejavu_fonts",
]

[phases.install]
# `npm ci` is reproducible and matches package-lock.json exactly. We DO need
# devDependencies during the build (tsc, vite, tsx) — `tsx` even stays
# required at runtime since `apps/server` runs via `tsx src/index.ts`. So
# we install everything; the production image carries node_modules as-is.
cmds = [
  "npm ci --include=dev",
]

[phases.build]
# Builds, in workspace order:
#   packages/shared  → tsc --noEmit  (type-check only; runtime imports .ts)
#   apps/server      → tsc --noEmit  (type-check)
#   apps/web         → tsc -b && vite build  → apps/web/dist/
# Then runs SQLite migrations so the deployed DB is at the schema this code
# expects. Safe to re-run on every deploy: each migration file is recorded
# in the _migrations table and skipped if already applied.
cmds = [
  "npm run build",
  "npm run migrate",
]

[start]
# Boots the Fastify API + websockets on $PORT (default 3001). The server's
# graceful-shutdown handler (SIGTERM) flushes any active agent-browser
# --session-name state to disk before exit, so Coolify-initiated restarts
# don't strand auth tokens in browser memory.
#
# The browser executable is selected via AGENT_BROWSER_EXECUTABLE_PATH in
# [variables] above (Nixpacks runs this cmd without a substitution-capable
# shell, so resolving it here with $(...) does not work).
cmd = "npm --workspace apps/server start"
